<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>選手詳細 — S.League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d14;--surf:#0f1520;--card:#141c28;--bdr:#1d2538;
  --gold:#c9a84c;--gold2:#e8c970;--silver:#8fa3b8;--bronze:#b5714a;
  --txt:#dce4f2;--muted:#5c6a82;--green:#4cba7d;--red:#e05c5c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);overflow-x:hidden}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  overflow-x:hidden;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  -webkit-text-size-adjust:100%;
  min-height:100vh;
}

/* ── HEADER ── */
.ph{
  padding:16px 16px 14px;
  background:linear-gradient(155deg,#0d1422 0%,#090d16 100%);
  border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}
.ph-back{
  background:rgba(255,255,255,.08);border:none;cursor:pointer;
  color:var(--txt);font-size:18px;line-height:1;
  padding:8px 12px;border-radius:8px;
  -webkit-tap-highlight-color:transparent;
  transition:background .15s;flex-shrink:0;
}
.ph-back:active{background:rgba(255,255,255,.18)}
.ph-title{
  font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.2em;
  color:var(--gold);text-transform:uppercase;
}

/* ── PLAYER HERO ── */
.hero{
  padding:28px 16px 24px;
  background:linear-gradient(155deg,#0d1422 0%,#090d16 100%);
  border-bottom:1px solid var(--bdr);
  position:relative;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 90% at 12% 0%,rgba(201,168,76,.09) 0%,transparent 65%);
}
.hero-inner{position:relative;max-width:600px;margin:0 auto}
.hero-rank{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.25em;
  color:var(--gold);margin-bottom:6px;
}
.hero-name{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,10vw,56px);letter-spacing:.04em;
  line-height:1;color:var(--txt);margin-bottom:16px;
}
.hero-stats{display:flex;gap:24px;flex-wrap:wrap}
.hs-v{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.04em}
.hs-l{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.sp{color:var(--green)}.sn{color:var(--red)}.sz{color:var(--muted)}

/* ── BEST/WORST BANNER ── */
.bw-bar{
  max-width:600px;margin:0 auto;
  display:flex;gap:0;
}
.bw-item{
  flex:1;padding:12px 16px;
  background:var(--card);
  border-bottom:1px solid var(--bdr);
}
.bw-item:first-child{border-right:1px solid var(--bdr)}
.bw-lbl{font-size:8px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.bw-ev{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.1em;color:var(--gold)}
.bw-sc{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em}

/* ── TABLE ── */
.main{max-width:600px;margin:0 auto;padding:20px 0 40px}
.sec-head{
  padding:0 16px 10px;
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);
}
.col-head{
  display:grid;grid-template-columns:64px 1fr 44px 56px;gap:4px;
  padding:8px 16px 7px;
  font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--bdr);
  background:var(--surf);
  position:sticky;top:57px; /* header height */
  z-index:10;
}
.row{
  display:grid;grid-template-columns:64px 1fr 44px 56px;gap:4px;
  padding:11px 16px;
  border-bottom:1px solid rgba(29,37,56,.6);
  align-items:center;
  transition:background .12s;
}
.row.win{background:rgba(201,168,76,.04)}
.row.win .rlbl{color:var(--gold2)}
.row:last-child{border-bottom:none}
.rlbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.12em;color:var(--gold)}
.rdate{font-size:10px;color:var(--muted)}
.rrank{font-family:'Bebas Neue',sans-serif;font-size:15px;text-align:center}
.rscore{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em;text-align:right}
.c1{color:var(--gold)}.c2{color:var(--silver)}.c3{color:var(--bronze)}.cx{color:var(--muted)}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:60px 16px;color:var(--muted);font-size:13px}

/* ── NOT FOUND ── */
.notfound{text-align:center;padding:80px 16px}
.notfound h2{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--gold);margin-bottom:8px}
.notfound p{font-size:13px;color:var(--muted)}
</style>
</head>

  const total = cum ? cum.total : entries.reduce((s,e)=>s+e.score,0);
  const wins  = cum ? cum.wins  : entries.filter(e=>e.isWin).length;
  const evCnt = cum ? cum.events: entries.length;
  const rank  = cum ? cum.rank  : null;
  const totalStr = fmt(total);
  const scCls = total>0?'sp':total<0?'sn':'sz';

  // Best / Worst
  let best = null, worst = null;
  entries.forEach(e => {
    if (best===null || e.score > best.score) best = e;
    if (worst===null || e.score < worst.score) worst = e;
  });

  // Build rows
  const rows = entries.map(e => {
    const rankIcon = e.rank===1?'🥇':e.rank===2?'🥈':e.rank===3?'🥉':'';
    return `
      <div class="row${e.isWin?' win':''}">
        <span class="rlbl">${e.lbl}</span>
        <span class="rdate">${e.date}</span>
        <span class="rrank ${rc(e.rank)}">${rankIcon || e.rank}</span>
        <span class="rscore ${sc(e.score)}">${fmt(e.score)}</span>
      </div>`;
  }).join('');

  const rankTxt = rank ? `累計 ${rank}位 ·` : '';

  container.innerHTML = `
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-rank">${rankTxt} ${evCnt}大会参加 · ${wins}優勝</div>
        <div class="hero-name">${name}</div>
        <div class="hero-stats">
          <div>
            <div class="hs-v ${scCls}">${totalStr}</div>
            <div class="hs-l">累計得点</div>
          </div>
          <div>
            <div class="hs-v">${evCnt}</div>
            <div class="hs-l">参加大会数</div>
          </div>
          <div>
            <div class="hs-v" style="color:var(--gold)">${wins}</div>
            <div class="hs-l">優勝回数</div>
          </div>
        </div>
      </div>
    </div>
    ${best && worst ? `
    <div class="bw-bar">
      <div class="bw-item">
        <div class="bw-lbl">ベスト大会</div>
        <div class="bw-ev">${best.lbl} · ${best.date}</div>
        <div class="bw-sc ${sc(best.score)}">${fmt(best.score)}</div>
      </div>
      <div class="bw-item">
        <div class="bw-lbl">ワースト大会</div>
        <div class="bw-ev">${worst.lbl} · ${worst.date}</div>
        <div class="bw-sc ${sc(worst.score)}">${fmt(worst.score)}</div>
      </div>
    </div>` : ''}
    <div class="main">
      <div class="col-head">
        <span>大会</span><span>日付</span><span style="text-align:center">順位</span><span style="text-align:right">得点</span>
      </div>
      ${rows || '<div class="empty">参加履歴がありません</div>'}
    </div>
  `;
}

render();
</script>
</body>
</html>
