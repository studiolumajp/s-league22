<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>S.League 成績アーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d14;--surf:#0f1520;--card:#141c28;--bdr:#1d2538;
  --gold:#c9a84c;--gold2:#e8c970;--silver:#8fa3b8;--bronze:#b5714a;
  --txt:#dce4f2;--muted:#5c6a82;--green:#4cba7d;--red:#e05c5c;
}
*{box-sizing:border-box;margin:0;padding:0}
/* Wix embed: bodyはスクロール主体、横あふれはclipで防ぐ */
html,body{
  background:var(--bg);color:var(--txt);
  font-family:'Noto Sans JP',sans-serif;font-weight:300;
  overflow-x:clip;          /* Wix iframeでも横スクロール防止 */
  -webkit-text-size-adjust:100%;
}

/* ── HEADER ── */
header{
  padding:28px 20px 22px;
  background:linear-gradient(155deg,#0d1422 0%,#090d16 100%);
  border-bottom:1px solid var(--bdr);position:relative;overflow:hidden
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 90% at 12% 0%,rgba(201,168,76,.09) 0%,transparent 65%),
             radial-gradient(ellipse 35% 55% at 88% 100%,rgba(61,100,220,.05) 0%,transparent 60%)
}
/* デスクトップのみ大きな背景装飾テキスト */
header::after{
  content:'SL';font-family:'Bebas Neue',sans-serif;font-size:200px;
  color:rgba(201,168,76,.025);position:absolute;right:-4px;top:-30px;
  line-height:1;pointer-events:none;letter-spacing:-.02em
}
.hi{position:relative;max-width:1080px;margin:0 auto}
.htag{font-family:'Bebas Neue',sans-serif;letter-spacing:.3em;font-size:9px;color:var(--gold);margin-bottom:6px}
h1{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,14vw,94px);letter-spacing:.04em;line-height:1;
  background:linear-gradient(130deg,var(--gold2) 0%,var(--gold) 50%,#9a7228 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
h1 a{
  background:inherit;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  text-decoration:none;transition:opacity .2s
}
h1 a:hover{opacity:.75}
.hsub{font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:.12em}
.hstats{display:flex;gap:28px;margin-top:20px;flex-wrap:wrap}
.hstat-v{font-family:'Bebas Neue',sans-serif;font-size:26px;color:var(--gold);letter-spacing:.06em}
.hstat-l{font-size:9px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}

/* ── TABS ── */
.tabbar{
  position:sticky;top:0;z-index:200;
  background:var(--surf);border-bottom:1px solid var(--bdr);
  /* Wix embed でstickyが効かない場合の代替 */
  -webkit-overflow-scrolling:touch;
}
.tabbar-inner{
  max-width:1080px;margin:0 auto;
  padding:0 4px;                /* 狭い画面でも左右余白最小に */
  display:flex;
  overflow-x:auto;              /* タブが入り切らなければ横スクロール */
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  gap:0;
}
.tabbar-inner::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;                /* タブが縮まないよう */
  padding:13px 14px;font-size:9px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;
  white-space:nowrap;
  color:var(--muted);cursor:pointer;background:none;border:none;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{color:var(--txt)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MAIN ── */
main{max-width:1080px;margin:0 auto;padding:24px 14px 40px}
.panel{display:none}.panel.on{display:block}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;margin-bottom:4px}
.ssub{font-size:9px;color:var(--muted);letter-spacing:.1em;margin-bottom:24px;line-height:1.6}

/* ── PODIUM ── */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:32px}
.pcard{
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:16px 8px 14px;text-align:center;position:relative;overflow:hidden;
  transition:transform .2s;-webkit-tap-highlight-color:transparent;
}
.pcard:active{transform:scale(.97)}
.pcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.p1::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.p2::after{background:linear-gradient(90deg,var(--silver),#aac0d8)}
.p3::after{background:linear-gradient(90deg,var(--bronze),#d49070)}
.pmed{font-size:20px;margin-bottom:6px}
.pnm{font-weight:700;font-size:11px;margin-bottom:5px;line-height:1.3}
.psc{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em}
.p1 .psc{color:var(--gold)}.p2 .psc{color:var(--silver)}.p3 .psc{color:var(--bronze)}
.pmt{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.05em}

/* ── RANK TABLE ── */
.rtbl{width:100%;border-collapse:collapse}
.rtbl thead tr{border-bottom:1px solid var(--bdr)}
.rtbl thead th{
  font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);padding:0 10px 10px;text-align:left
}
.rtbl thead th.r{text-align:right}
.rtbl tbody tr{border-bottom:1px solid rgba(29,37,56,.7);transition:background .15s}
.rtbl tbody tr:hover{background:rgba(255,255,255,.025)}
.rtbl tbody td{padding:10px 10px;font-size:12px}
.rtbl tbody td.r{text-align:right}
.rn{font-family:'Bebas Neue',sans-serif;font-size:16px;width:30px;display:inline-block;text-align:center}
.c1{color:var(--gold)}.c2{color:var(--silver)}.c3{color:var(--bronze)}.cx{color:var(--muted);font-size:13px}
.pnm2{
  font-weight:700;font-size:13px;
  cursor:pointer;border-bottom:1px dashed rgba(201,168,76,.4);
  transition:color .15s,border-color .15s;display:inline-block;
}
.pnm2:hover{color:var(--gold);border-bottom-color:var(--gold)}
.sv{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.04em}
.sp{color:var(--green)}.sn{color:var(--red)}.sz{color:var(--muted)}
.wn{
  display:inline-block;background:rgba(201,168,76,.12);color:var(--gold);
  border:1px solid rgba(201,168,76,.28);border-radius:3px;
  padding:1px 5px;font-size:8px;font-weight:700;letter-spacing:.06em;margin-left:4px;vertical-align:middle
}
.ec{color:var(--muted);font-size:10px}

/* ── ARCHIVE ── */
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:12px}
.ehead{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:rgba(255,255,255,.015);
  border-bottom:1px solid transparent;cursor:pointer;transition:background .15s;
  user-select:none;-webkit-tap-highlight-color:transparent;
}
.ehead:active{background:rgba(255,255,255,.04)}
.ecard.open .ehead{border-bottom-color:var(--bdr)}
.enum{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.2em;color:var(--gold)}
.etl{font-weight:700;font-size:13px;margin-top:3px}
.ewrap{display:flex;align-items:center;gap:6px}
.ewcr{font-size:13px}.ewnm{font-weight:700;font-size:11px}
.ewsc{font-family:'Bebas Neue',sans-serif;font-size:14px;color:var(--gold);letter-spacing:.04em}
.chv{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:8px}
.ecard.open .chv{transform:rotate(180deg)}
.ebody{display:none}.ecard.open .ebody{display:block}
/* アーカイブ内テーブルも横スクロール対応 */
.ebody-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.etbl{width:100%;border-collapse:collapse;min-width:280px}
.etbl tr{border-bottom:1px solid rgba(29,37,56,.5)}
.etbl tr:last-child{border-bottom:none}
.etbl tr:hover{background:rgba(255,255,255,.015)}
.etbl td{padding:8px 16px;font-size:11px}
.etbl td:last-child{text-align:right}
.ern{font-family:'Bebas Neue',sans-serif;font-size:14px;width:30px;display:inline-block;text-align:center}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(5,8,16,.88);backdrop-filter:blur(6px);
  -webkit-backdrop-filter:blur(6px);
  align-items:flex-end;       /* iPhoneはシートとして下から出す */
  justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--card);border:1px solid var(--bdr);
  border-radius:16px 16px 0 0;  /* 下部はiPhoneのホームバーのため角丸なし */
  width:100%;max-width:560px;
  max-height:85dvh;             /* dvh = dynamic viewport height (Safe Area対応) */
  overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 -8px 40px rgba(0,0,0,.5);
  animation:mslide .25s ease
}
@keyframes mslide{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:none}}
.modal-head{
  padding:20px 20px 16px;
  border-bottom:1px solid var(--bdr);
  background:linear-gradient(135deg,rgba(201,168,76,.07) 0%,transparent 60%);
  position:relative;flex-shrink:0
}
/* ドラッグハンドル */
.modal-head::before{
  content:'';display:block;width:36px;height:4px;border-radius:2px;
  background:rgba(255,255,255,.15);margin:0 auto 14px;
}
.modal-close{
  position:absolute;top:14px;right:14px;
  background:rgba(255,255,255,.08);border:none;cursor:pointer;
  color:var(--muted);font-size:16px;line-height:1;
  transition:color .15s;padding:6px 9px;border-radius:6px;
  -webkit-tap-highlight-color:transparent;
}
.modal-close:active{background:rgba(255,255,255,.15)}
.modal-player{
  font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:.06em;
  color:var(--txt);margin-bottom:10px
}
.modal-stats{display:flex;gap:20px;flex-wrap:wrap}
.mstat-v{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.04em}
.mstat-l{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.modal-body{overflow-y:auto;flex:1;-webkit-overflow-scrolling:touch}
.modal-section-head{
  padding:10px 20px 8px;
  font-size:8px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--bdr);
  display:grid;grid-template-columns:70px 1fr 50px 54px;gap:4px
}
.mtbl-row{
  display:grid;grid-template-columns:70px 1fr 50px 54px;gap:4px;
  padding:10px 20px;border-bottom:1px solid rgba(29,37,56,.5);
  align-items:center;transition:background .12s
}
.mtbl-row:last-child{border-bottom:none}
.mtbl-row:hover{background:rgba(255,255,255,.02)}
.mtbl-row.win .mlbl{color:var(--gold)}
.mlbl{font-family:'Bebas Neue',sans-serif;font-size:12px;letter-spacing:.12em;color:var(--gold)}
.mdate{font-size:9px;color:var(--muted)}
.mrank{font-family:'Bebas Neue',sans-serif;font-size:14px;text-align:center}
.mscore{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:.04em;text-align:right}
.modal-foot{
  padding:12px 20px;border-top:1px solid var(--bdr);
  padding-bottom:max(12px,env(safe-area-inset-bottom)); /* ホームバー対応 */
  font-size:9px;color:var(--muted);text-align:center;flex-shrink:0
}

/* ── TEAM PODIUM ── */
.tpodium{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:28px}
.tcard{
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:14px 6px 12px;text-align:center;position:relative;overflow:hidden;
  transition:transform .15s;-webkit-tap-highlight-color:transparent;
}
.tcard:active{transform:scale(.96)}
.tcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.tp1::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.tp2::after{background:linear-gradient(90deg,var(--silver),#aac0d8)}
.tp3::after{background:linear-gradient(90deg,var(--bronze),#d49070)}
.tmed{font-size:18px;margin-bottom:5px}
.tnm{font-weight:700;font-size:10px;margin-bottom:4px;line-height:1.3}
.tsc{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.04em}
.tp1 .tsc{color:var(--gold)}.tp2 .tsc{color:var(--silver)}.tp3 .tsc{color:var(--bronze)}
.tmem{font-size:8px;color:var(--muted);margin-top:3px;letter-spacing:.03em}

/* ── TEAM DETAIL CARDS ── */
.tdet{
  background:var(--card);border:1px solid var(--bdr);border-radius:12px;
  overflow:hidden;margin-bottom:16px;scroll-margin-top:56px /* タブバー高さ分 */
}
.tdet-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 16px;gap:8px;
  background:linear-gradient(135deg,rgba(201,168,76,.06) 0%,transparent 60%);
  border-bottom:1px solid var(--bdr)
}
.tdet-name{
  font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.08em;
  color:var(--txt);margin-bottom:3px
}
.tdet-members{font-size:10px;color:var(--muted);letter-spacing:.05em}
.tdet-total{text-align:right;flex-shrink:0}
/* 詳細テーブルは横スクロール。min-widthを極力コンパクトに */
.tdet-body{overflow-x:auto;-webkit-overflow-scrolling:touch}
.td-tbl{width:100%;border-collapse:collapse;min-width:400px}
.td-tbl thead tr{border-bottom:1px solid var(--bdr)}
.td-tbl thead th{
  font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);padding:7px 8px;text-align:left;white-space:nowrap
}
.td-tbl thead th.r{text-align:right}
.td-row{border-bottom:1px solid rgba(29,37,56,.5);transition:background .12s}
.td-row:last-child{border-bottom:none}
.td-round{
  font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.08em;
  color:var(--muted);padding:9px 8px;white-space:nowrap;width:44px
}
.td-player{padding:9px 6px;white-space:nowrap}
.td-name{font-size:11px;font-weight:700;margin-right:4px}
.td-rank{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:.06em}
.td-medal{font-size:10px;margin-left:1px}
.td-pts{padding:9px 8px;white-space:nowrap;text-align:right}
.td-team{
  padding:9px 8px;white-space:nowrap;text-align:right;
  border-left:1px solid var(--bdr);font-weight:700
}
.td-run{
  padding:9px 8px;white-space:nowrap;text-align:right;
  border-left:1px dashed rgba(29,37,56,.7);color:var(--muted)
}

/* ── 大画面用調整（≥640px） ── */
@media(min-width:640px){
  header{padding:48px 44px 36px}
  header::after{font-size:280px}
  main{padding:40px 44px}
  .tabbar-inner{padding:0 44px}
  .tab{padding:15px 22px;font-size:10px}
  .stitle{font-size:26px}
  .podium{gap:12px;max-width:600px}
  .pcard{padding:22px 16px 18px}
  .pmed{font-size:24px}
  .pnm{font-size:13px}
  .psc{font-size:22px}
  .hstats{gap:48px;margin-top:28px}
  .hstat-v{font-size:30px}
  .rtbl thead th{font-size:9px;padding:0 14px 12px}
  .rtbl tbody td{padding:11px 14px;font-size:13px}
  .rn{font-size:18px;width:36px}
  .sv{font-size:15px}
  .tpodium{gap:12px;max-width:600px}
  .tcard{padding:20px 14px 16px}
  .tmed{font-size:22px}
  .tnm{font-size:13px}
  .tsc{font-size:21px}
  .td-tbl{min-width:520px}
  .td-tbl thead th{font-size:9px;padding:8px 12px}
  .td-round{font-size:12px;padding:10px 12px;width:56px}
  .td-player{padding:10px 8px}
  .td-name{font-size:12px}
  .td-pts,.td-team,.td-run{padding:10px 12px}
  .tdet-head{padding:20px 24px}
  .tdet-name{font-size:22px}
  .modal-bg{align-items:center}
  .modal{border-radius:14px;max-height:88vh}
  .modal-head::before{display:none}
  .modal-head{padding:24px 26px 18px}
  .modal-player{font-size:28px}
  .modal-section-head,.mtbl-row{grid-template-columns:80px 1fr 60px 60px;padding:10px 26px}
  .ewrap{display:flex}
}
</style>
</head>
<body>

<header>
<div class="hi">
  <div class="htag">Official Records · 麻雀大会</div>
  <h1><a href="https://s-league.info" target="_blank" rel="noopener">S.LEAGUE</a></h1>
  <div class="hsub">成績アーカイブ</div>
  <div class="hstats">
    <div><div class="hstat-v">22</div><div class="hstat-l">大会数</div></div>
    <div><div class="hstat-v">335</div><div class="hstat-l">延べ参加人数</div></div>
    <div><div class="hstat-v">113</div><div class="hstat-l">参加選手数</div></div>
  </div>
</div>
</header>

<nav class="tabbar">
  <div class="tabbar-inner">
    <button class="tab on" data-tab="ranking">累計ランキング</button>
    <button class="tab" data-tab="archive">大会アーカイブ</button>
    <button class="tab" data-tab="team22">SL22 団体結果</button>
  </div>
</nav>

<main>
  <div id="p-ranking" class="panel on">
    <div class="stitle">累計ランキング</div>
    <div class="ssub">全22大会の総合得点合計による順位 — 選手名をクリックで詳細表示</div>
    <div class="podium" id="podium"></div>
    <table class="rtbl">
      <thead><tr>
        <th>順位</th><th>選手名</th>
        <th class="r">参加</th><th class="r">優勝</th><th class="r">累計得点</th>
      </tr></thead>
      <tbody id="rbody"></tbody>
    </table>
  </div>

  <div id="p-archive" class="panel">
    <div class="stitle">大会アーカイブ</div>
    <div class="ssub">各大会の結果一覧 — 行クリックで展開</div>
    <div id="alist"></div>
  </div>

  <div id="p-team22" class="panel">
    <div class="stitle">S.League 22 — 団体結果</div>
    <div class="ssub">2026.3.7 · 3卓×12名×8戦 / 2人1組チーム戦 — チームをクリックで詳細表示</div>
    <div class="tpodium" id="tpodium22"></div>
    <table class="rtbl" style="margin-bottom:40px">
      <thead><tr>
        <th>順位</th><th>チーム名</th><th>メンバー</th>
        <th class="r">チームP</th>
      </tr></thead>
      <tbody id="tbody22"></tbody>
    </table>
    <div id="team-detail-area"></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-head">
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
      <div class="modal-player" id="m-name"></div>
      <div class="modal-stats" id="m-stats"></div>
    </div>
    <div class="modal-section-head">
      <span>大会</span><span>日付</span><span style="text-align:center">順位</span><span style="text-align:right">得点</span>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot" id="m-foot"></div>
  </div>

// ── Modal
function openModal(name) {
  // 累計データ取得
  const cum = CUM.find(p=>p.name===name);
  if (!cum) return;

  document.getElementById('m-name').textContent = name;

  // サマリー統計
  const totalStr = fmt(cum.total);
  const scCls = cum.total>0?'sp':cum.total<0?'sn':'sz';
  document.getElementById('m-stats').innerHTML = `
    <div>
      <div class="mstat-v ${scCls}">${totalStr}</div>
      <div class="mstat-l">累計得点</div>
    </div>
    <div>
      <div class="mstat-v">${cum.events}</div>
      <div class="mstat-l">参加大会数</div>
    </div>
    <div>
      <div class="mstat-v" style="color:var(--gold)">${cum.wins}</div>
      <div class="mstat-l">優勝回数</div>
    </div>
  `;

  // 各大会の成績（番号昇順）
  const evNums = Object.keys(EVENTS).map(Number).sort((a,b)=>a-b);
  const rows = [];
  let best = null, worst = null;

  evNums.forEach(n => {
    const found = EVENTS[n].find(p=>p.name===name);
    if (!found) return;
    const m = META[String(n)]||{};
    const lbl = m.label||('#'+String(n).padStart(2,'0'));
    const dt  = m.date||'';
    const rank = found.rank||'—';
    const score = found.total;
    const isWin = found.rank===1;

    if (best===null || score > best.score) best={lbl,score};
    if (worst===null || score < worst.score) worst={lbl,score};

    const rankIcon = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const rankCls  = rc(rank);
    rows.push(`
      <div class="mtbl-row${isWin?' win':''}">
        <span class="mlbl">${lbl}</span>
        <span class="mdate">${dt}</span>
        <span class="mrank ${rankCls}">${rankIcon||rank}</span>
        <span class="mscore ${sc(score)}">${fmt(score)}</span>
      </div>
    `);
  });

  document.getElementById('m-body').innerHTML = rows.join('');

  // フッター: ベスト・ワースト
  const footParts = [];
  if (best)  footParts.push(`ベスト ${best.lbl}：${fmt(best.score)}`);
  if (worst) footParts.push(`ワースト ${worst.lbl}：${fmt(worst.score)}`);
  document.getElementById('m-foot').textContent = footParts.join('　　');

  document.getElementById('modal-bg').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-bg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-bg').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });

// ── チーム詳細カード生成
function renderTeamDetails() {
  const rkMedal = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':'';
  const rkCls   = r => r===1?'c1':r===2?'c2':r===3?'c3':'cx';
  document.getElementById('team-detail-area').innerHTML = SL22_DETAIL.map(t=>{
    // 累積推移
    let running = 0;
    const rows = t.rounds.map(r=>{
      running = Math.round((running + r.team)*10)/10;
      const p1c = r.p1.pts!=null?(r.p1.pts>=0?'sp':'sn'):'sz';
      const p2c = r.p2.pts!=null?(r.p2.pts>=0?'sp':'sn'):'sz';
      const tc  = r.team>=0?'sp':'sn';
      const p1m = r.p1.pts!=null?rkMedal(r.p1.rank):'';
      const p2m = r.p2.pts!=null?rkMedal(r.p2.rank):'';
      const runC = running>=0?'sp':'sn';
      return `<tr class="td-row">
        <td class="td-round">第${r.round}戦</td>
        <td class="td-player">
          <span class="td-name">${r.p1.name}</span>
          <span class="td-rank ${rkCls(r.p1.rank)}">${r.p1.rank!=null?r.p1.rank+'位':'—'}</span>
          ${p1m?`<span class="td-medal">${p1m}</span>`:''}
        </td>
        <td class="r td-pts"><span class="sv ${p1c}">${r.p1.pts!=null?fmt(r.p1.pts):'—'}</span></td>
        <td class="td-player">
          <span class="td-name">${r.p2.name}</span>
          <span class="td-rank ${rkCls(r.p2.rank)}">${r.p2.rank!=null?r.p2.rank+'位':'—'}</span>
          ${p2m?`<span class="td-medal">${p2m}</span>`:''}
        </td>
        <td class="r td-pts"><span class="sv ${p2c}">${r.p2.pts!=null?fmt(r.p2.pts):'—'}</span></td>
        <td class="r td-team"><span class="sv ${tc}">${fmt(r.team)}</span></td>
        <td class="r td-run"><span class="sv ${runC}">${fmt(running)}</span></td>
      </tr>`;
    }).join('');
    const totalC = t.total>=0?'sp':'sn';
    return `
    <div class="tdet" id="tdet-${t.rank}">
      <div class="tdet-head">
        <div>
          <div style="font-size:10px;letter-spacing:.15em;color:var(--gold);font-family:'Bebas Neue',sans-serif;margin-bottom:4px">#${t.rank}</div>
          <div class="tdet-name">${t.name}</div>
          <div class="tdet-members">${t.members.join('　/　')}</div>
        </div>
        <div class="tdet-total"><span class="sv ${totalC}" style="font-size:28px">${fmt(t.total)}</span></div>
      </div>
      <div class="tdet-body">
        <table class="td-tbl">
          <thead>
            <tr>
              <th></th>
              <th colspan="2">${t.members[0]}</th>
              <th colspan="2">${t.members[1]}</th>
              <th class="r">チームP</th>
              <th class="r">累積</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');
}

function scrollToTeam(rank) {
  const el = document.getElementById('tdet-'+rank);
  if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

renderTeamDetails();
</script>
