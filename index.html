<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>S.League 成績アーカイブ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#090d14;--surf:#0f1520;--card:#141c28;--bdr:#1d2538;
  --gold:#c9a84c;--gold2:#e8c970;--silver:#8fa3b8;--bronze:#b5714a;
  --txt:#dce4f2;--muted:#5c6a82;--green:#4cba7d;--red:#e05c5c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{
  padding:48px 44px 36px;
  background:linear-gradient(155deg,#0d1422 0%,#090d16 100%);
  border-bottom:1px solid var(--bdr);position:relative;overflow:hidden
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 90% at 12% 0%,rgba(201,168,76,.09) 0%,transparent 65%),
             radial-gradient(ellipse 35% 55% at 88% 100%,rgba(61,100,220,.05) 0%,transparent 60%)
}
header::after{
  content:'SL';font-family:'Bebas Neue',sans-serif;font-size:280px;
  color:rgba(201,168,76,.025);position:absolute;right:-8px;top:-40px;
  line-height:1;pointer-events:none;letter-spacing:-.02em
}
.hi{position:relative;max-width:1080px;margin:0 auto}
.htag{font-family:'Bebas Neue',sans-serif;letter-spacing:.35em;font-size:10px;color:var(--gold);margin-bottom:8px}
h1{
  font-family:'Bebas Neue',sans-serif;font-size:clamp(50px,8vw,94px);letter-spacing:.04em;line-height:1;
  background:linear-gradient(130deg,var(--gold2) 0%,var(--gold) 50%,#9a7228 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.hsub{font-size:11px;color:var(--muted);margin-top:10px;letter-spacing:.12em}
.hstats{display:flex;gap:48px;margin-top:28px;flex-wrap:wrap}
.hstat-v{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--gold);letter-spacing:.06em}
.hstat-l{font-size:9px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}

/* ── TABS ── */
.tabbar{position:sticky;top:0;z-index:200;background:var(--surf);border-bottom:1px solid var(--bdr)}
.tabbar-inner{max-width:1080px;margin:0 auto;padding:0 44px;display:flex}
.tab{
  padding:15px 22px;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;background:none;border:none;
  border-bottom:2px solid transparent;transition:color .2s,border-color .2s
}
.tab:hover{color:var(--txt)}.tab.on{color:var(--gold);border-bottom-color:var(--gold)}

/* ── MAIN ── */
main{max-width:1080px;margin:0 auto;padding:40px 44px}
.panel{display:none}.panel.on{display:block}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.1em;margin-bottom:4px}
.ssub{font-size:10px;color:var(--muted);letter-spacing:.12em;margin-bottom:32px}

/* ── PODIUM ── */
.podium{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px;max-width:600px}
.pcard{
  background:var(--card);border:1px solid var(--bdr);border-radius:10px;
  padding:22px 16px 18px;text-align:center;position:relative;overflow:hidden;transition:transform .2s
}
.pcard:hover{transform:translateY(-3px)}
.pcard::after{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.p1::after{background:linear-gradient(90deg,var(--gold),var(--gold2))}
.p2::after{background:linear-gradient(90deg,var(--silver),#aac0d8)}
.p3::after{background:linear-gradient(90deg,var(--bronze),#d49070)}
.pmed{font-size:24px;margin-bottom:8px}
.pnm{font-weight:700;font-size:13px;margin-bottom:6px;line-height:1.3}
.psc{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.04em}
.p1 .psc{color:var(--gold)}.p2 .psc{color:var(--silver)}.p3 .psc{color:var(--bronze)}
.pmt{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:.06em}

/* ── RANK TABLE ── */
.rtbl{width:100%;border-collapse:collapse}
.rtbl thead tr{border-bottom:1px solid var(--bdr)}
.rtbl thead th{
  font-size:9px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
  color:var(--muted);padding:0 14px 12px;text-align:left
}
.rtbl thead th.r{text-align:right}
.rtbl tbody tr{border-bottom:1px solid rgba(29,37,56,.7);transition:background .15s}
.rtbl tbody tr:hover{background:rgba(255,255,255,.025)}
.rtbl tbody td{padding:11px 14px;font-size:13px}
.rtbl tbody td.r{text-align:right}
.rn{font-family:'Bebas Neue',sans-serif;font-size:18px;width:36px;display:inline-block;text-align:center}
.c1{color:var(--gold)}.c2{color:var(--silver)}.c3{color:var(--bronze)}.cx{color:var(--muted);font-size:14px}
.pnm2{
  font-weight:700;font-size:14px;
  cursor:pointer;border-bottom:1px dashed rgba(201,168,76,.4);
  transition:color .15s,border-color .15s;display:inline-block;
}
.pnm2:hover{color:var(--gold);border-bottom-color:var(--gold)}
.sv{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:.04em}
.sp{color:var(--green)}.sn{color:var(--red)}.sz{color:var(--muted)}
.wn{
  display:inline-block;background:rgba(201,168,76,.12);color:var(--gold);
  border:1px solid rgba(201,168,76,.28);border-radius:3px;
  padding:1px 7px;font-size:9px;font-weight:700;letter-spacing:.08em;margin-left:6px;vertical-align:middle
}
.ec{color:var(--muted);font-size:11px}

/* ── ARCHIVE ── */
.ecard{background:var(--card);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;margin-bottom:16px}
.ehead{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 22px;background:rgba(255,255,255,.015);
  border-bottom:1px solid transparent;cursor:pointer;transition:background .15s;user-select:none
}
.ehead:hover{background:rgba(255,255,255,.03)}
.ecard.open .ehead{border-bottom-color:var(--bdr)}
.enum{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:.22em;color:var(--gold)}
.etl{font-weight:700;font-size:14px;margin-top:3px}
.ewrap{display:flex;align-items:center;gap:8px}
.ewcr{font-size:14px}.ewnm{font-weight:700;font-size:12px}
.ewsc{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--gold);letter-spacing:.04em}
.chv{font-size:10px;color:var(--muted);transition:transform .2s;margin-left:10px}
.ecard.open .chv{transform:rotate(180deg)}
.ebody{display:none}.ecard.open .ebody{display:block}
.etbl{width:100%;border-collapse:collapse}
.etbl tr{border-bottom:1px solid rgba(29,37,56,.5)}
.etbl tr:last-child{border-bottom:none}
.etbl tr:hover{background:rgba(255,255,255,.015)}
.etbl td{padding:9px 22px;font-size:12px}
.etbl td:last-child{text-align:right}
.ern{font-family:'Bebas Neue',sans-serif;font-size:15px;width:34px;display:inline-block;text-align:center}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(5,8,16,.85);backdrop-filter:blur(6px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--card);border:1px solid var(--bdr);border-radius:14px;
  width:100%;max-width:560px;max-height:88vh;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:mslide .22s ease
}
@keyframes mslide{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.modal-head{
  padding:24px 26px 18px;
  border-bottom:1px solid var(--bdr);
  background:linear-gradient(135deg,rgba(201,168,76,.07) 0%,transparent 60%);
  position:relative;flex-shrink:0
}
.modal-close{
  position:absolute;top:16px;right:18px;
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:20px;line-height:1;
  transition:color .15s;padding:4px 8px;border-radius:4px
}
.modal-close:hover{color:var(--txt);background:rgba(255,255,255,.06)}
.modal-player{
  font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:.06em;
  color:var(--txt);margin-bottom:10px
}
.modal-stats{display:flex;gap:24px;flex-wrap:wrap}
.mstat-v{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.04em}
.mstat-l{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.modal-body{overflow-y:auto;flex:1}
.modal-section-head{
  padding:12px 26px 8px;
  font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--muted);border-bottom:1px solid var(--bdr);
  display:grid;grid-template-columns:80px 1fr 60px 60px;gap:8px
}
.mtbl-row{
  display:grid;grid-template-columns:80px 1fr 60px 60px;gap:8px;
  padding:11px 26px;border-bottom:1px solid rgba(29,37,56,.5);
  align-items:center;transition:background .12s
}
.mtbl-row:last-child{border-bottom:none}
.mtbl-row:hover{background:rgba(255,255,255,.02)}
.mtbl-row.win .mlbl{color:var(--gold)}
.mlbl{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.14em;color:var(--gold)}
.mdate{font-size:10px;color:var(--muted)}
.mrank{
  font-family:'Bebas Neue',sans-serif;font-size:16px;text-align:center
}
.mscore{
  font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:.04em;text-align:right
}
.modal-foot{
  padding:14px 26px;border-top:1px solid var(--bdr);
  font-size:10px;color:var(--muted);text-align:center;flex-shrink:0
}

@media(max-width:640px){
  header{padding:20px 14px 18px}
  main{padding:16px 12px}
  .tabbar-inner{padding:0 12px}
  .tab{padding:10px 10px;font-size:9px}
  /* 表彰台：横幅に収まるよう文字・パディングを縮小 */
  .podium{max-width:100%;gap:6px}
  .pcard{padding:14px 8px 12px}
  .pmed{font-size:18px;margin-bottom:5px}
  .pnm{font-size:11px}
  .psc{font-size:17px}
  .pmt{font-size:8px}
  /* ヘッダー統計 */
  .hstats{gap:20px;margin-top:16px}
  .hstat-v{font-size:22px}
  /* ランキングテーブル */
  .rtbl thead th{font-size:8px;padding:0 8px 10px}
  .rtbl tbody td{padding:9px 8px;font-size:11px}
  header::after{display:none}
  .ewrap{display:none}
  .modal{max-width:100%;max-height:92vh}
  .modal-section-head,.mtbl-row{grid-template-columns:60px 1fr 44px 50px;padding:9px 14px}
}
@media(max-width:390px){
  .podium{gap:4px}
  .pcard{padding:10px 5px 10px}
  .pnm{font-size:10px}
  .psc{font-size:15px}
  .hstats{gap:14px}
  .hstat-v{font-size:19px}
}
</style>
</head>

    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot" id="m-foot"></div>
  </div>
</div>

// ── Modal
function openModal(name) {
  // 累計データ取得
  const cum = CUM.find(p=>p.name===name);
  if (!cum) return;

  document.getElementById('m-name').textContent = name;

  // サマリー統計
  const totalStr = fmt(cum.total);
  const scCls = cum.total>0?'sp':cum.total<0?'sn':'sz';
  document.getElementById('m-stats').innerHTML = `
    <div>
      <div class="mstat-v ${scCls}">${totalStr}</div>
      <div class="mstat-l">累計得点</div>
    </div>
    <div>
      <div class="mstat-v">${cum.events}</div>
      <div class="mstat-l">参加大会数</div>
    </div>
    <div>
      <div class="mstat-v" style="color:var(--gold)">${cum.wins}</div>
      <div class="mstat-l">優勝回数</div>
    </div>
  `;

  // 各大会の成績（番号昇順）
  const evNums = Object.keys(EVENTS).map(Number).sort((a,b)=>a-b);
  const rows = [];
  let best = null, worst = null;

  evNums.forEach(n => {
    const found = EVENTS[n].find(p=>p.name===name);
    if (!found) return;
    const m = META[String(n)]||{};
    const lbl = m.label||('#'+String(n).padStart(2,'0'));
    const dt  = m.date||'';
    const rank = found.rank||'—';
    const score = found.total;
    const isWin = found.rank===1;

    if (best===null || score > best.score) best={lbl,score};
    if (worst===null || score < worst.score) worst={lbl,score};

    const rankIcon = rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':'';
    const rankCls  = rc(rank);
    rows.push(`
      <div class="mtbl-row${isWin?' win':''}">
        <span class="mlbl">${lbl}</span>
        <span class="mdate">${dt}</span>
        <span class="mrank ${rankCls}">${rankIcon||rank}</span>
        <span class="mscore ${sc(score)}">${fmt(score)}</span>
      </div>
    `);
  });

  document.getElementById('m-body').innerHTML = rows.join('');

  // フッター: ベスト・ワースト
  const footParts = [];
  if (best)  footParts.push(`ベスト ${best.lbl}：${fmt(best.score)}`);
  if (worst) footParts.push(`ワースト ${worst.lbl}：${fmt(worst.score)}`);
  document.getElementById('m-foot').textContent = footParts.join('　　');

  document.getElementById('modal-bg').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-bg')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-bg').classList.remove('show');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModalDirect(); });
